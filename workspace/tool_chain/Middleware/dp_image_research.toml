[image_display]
enabled = true
max_images = 12
max_width = 640
max_height = 480
thumbnail_width = 160
thumbnail_height = 120
columns = 3
auto_fetch = true
allowed_extensions = [".png", ".jpg", ".jpeg", ".gif", ".webp", ".bmp", ".svg"]

[cache]
dir = "/home/andre/dev_root/robot/QRP/dp_image_cache"
max_cache_mb = 512
cleanup_days = 7

[image_search]
enabled = true
timeout_seconds = 30
max_redirects = 3
user_agent = "DP-Chat-ImageMiddleware/1.0"

[display]
show_captions = true
show_urls = true
background_color = "#f0f0f0"
border_style = "1px solid #ccc"
border_radius = 6
spacing = 8

[stream]
parse_markdown_images = true
parse_raw_urls = true
debounce_ms = 500
